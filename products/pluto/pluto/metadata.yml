- id: plutomapid
  display_name: plutomapid
  data_type: integer
  description: "A code indicating whether the tax lot is in the PLUTO file, the MapPLUTO\
    \ file with water areas included, and/or the MapPLUTO file that is clipped to\
    \ the shoreline.\n\nBecause the Digital Tax Map (DTM) and the Property Tax System\
    \ (PTS) are not updated at the same time, they are slightly out-of-sync. There\
    \ will be lots in PTS that are not in the DTM and vice versa. In addition, some\
    \ lots are wholly underwater and are not included in the version of MapPLUTO that\
    \ is clipped to the shoreline.\n\nThe lot geographies in MapPLUTO (with water\
    \ areas included) are created from the DTM. City Planning modifies the DTM for\
    \ condominium lots to show the billing tax lot in MapPLUTO, rather than the base\
    \ tax lot. If there is more than one base tax lot with the same billing lot, the\
    \ base tax lots are merged into a single feature and assigned to the billing lot.\
    \ See LOT for more information on condominium lots.\n\nMapPLUTO (clipped to shoreline)\
    \ is created by clipping the full MapPLUTO using DOF\u2019s Shoreline File.\n"
  data_source: "Department of City Planning - PLUTO Data File\nDepartment of City\
    \ Planning \u2013 MapPLUTO (water areas included)\nDepartment of City Planning\
    \ \u2013 MapPLUTO (clipped to shoreline)\nDepartment of Finance - Digital Tax\
    \ Map\nDepartment of Finance - Shoreline File\nDepartment of Finance - Property\
    \ Tax System (PTS)\n"
  example: '1'
  values:
  - value: '1'
    description: Lot is in PLUTO and both versions of MapPLUTO
  - value: '2'
    description: Lot is in PLUTO only.
  - value: '3'
    description: Lot is in both versions of MapPLUTO, but not in PLUTO
  - value: '4'
    description: Lot is in PLUTO and MapPLUTO (with water areas included), but not
      in the clipped version of MapPLUTO. Tax lot is completely under water.
  - value: '5'
    description: Lot is in MapPLUTO (with water areas included), but not in the clipped
      version of MapPLUTO or in PLUTO. Tax lot is completely under water.
  custom:
    readme_data_type: Numeric - 1 digit
- id: version
  display_name: version
  data_type: text
  description: "The version number for this release of PLUTO.\n\nThe Version Number\
    \ is in the format YYv#.# where:\n  YY is the last two digits of the year;\n \
    \ v stands for version;\n  \\# is the release number for that year; and .# indicates\
    \ an amendment to the original release, if applicable.\n"
  data_source: Department of City Planning
  checks:
