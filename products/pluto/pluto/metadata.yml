- id: spdist1
  display_name: spdist1
  data_type: text
  description: "The special purpose district assigned to the tax lot. The regulations\
    \ for special purpose districts are designed to supplement and modify the underlying\
    \ zoning in order to respond to distinctive neighborhoods with particular issues\
    \ and goals. Only special purpose districts that cover at least 10% of a tax lot\u2019\
    s area are included.\n\nIf the tax lot is not in a special purpose district, the\
    \ field is blank.\n\nIf more than one special purpose district exists on the tax\
    \ lot, SPECIAL PURPOSE DISTRICT 1 represents the special purpose district occupying\
    \ the greatest percentage of the lot area. If the greatest percentage is occupied\
