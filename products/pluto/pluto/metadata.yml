- id: bldgclass
  display_name: bldgclass
  data_type: text
  description: "A code describing the major use of structures on the tax lot.\n\n\
    Except as described below, BUILDING CLASS is taken from PTS without modification.\n\
    \nFor condominiums, PTS contains the building class for each unit lot. When merging\
    \ this data into a single record for the billing lot, DCP creates several mixed-use\
    \ building classes (RC, RD, RI, RM, RX, and RZ). These are assigned as follows:\n\
    \u2022 If all unit lots have the same building class, that building class is used\
    \ for the\nbilling lot.\n\u2022 PTS building class types are grouped as follows:\n\
    \  o Commercial - R5, R7, R8, RA, RB, RH, and RK\n  o Residential - R1, R2, R3,\
    \ R4, R6, and RR\n  o Mixed commercial and residential \u2013 R9\n  o Industrial/warehouse\
    \ - RW\n\u2022 If the unit lots are a mixture of commercial building types, BUILDING\
    \ CLASS = RC.\n\u2022 If the unit lots are a mixture of residential building types,\
    \ BUILDING CLASS = RD.\n\u2022 If the unit lots are a mixture of commercial and\
    \ residential building types, BUILDING CLASS = RM.\n\u2022 If the unit lots are\
    \ a mixture of commercial and industrial/warehouse building types, BUILDING CLASS\
    \ = RI.\n\u2022 If the unit lots are a mixture of commercial, residential, and\
    \ industrial/warehouse building types, BUILDING CLASS = RX.\n\u2022 If the unit\
    \ lots are a mixture of residential and industrial/warehouse building types, BUILDING\
    \ CLASS = RZ.\n\u2022 When unit lots with a building class of RG (Indoor Parking),\
    \ RP (Outdoor Parking), RS (Non-Business Storage Space), or RT (Terraces/Gardens/Cabanas)\
    \ have the same billing lot as another building class, their building class is\
    \ ignored. For example, if the billing lot has unit lots with a building class\
    \ of R4 (Residential Unit in Elevator Bldg) and RG (Indoor Parking), BUILDING\
    \ CLASS = R4.\n\nQ0 is assigned by DCP to tax lots with a PTS building class starting\
    \ with \u201CV\u201D that are identified in the NYC GIS Zoning Database as PARK,\
    \ BALL FIELD, PLAYGROUND, or PUBLIC SPACE.\n\nQG is assigned by DCP to tax lots\
    \ with a PTS building class starting with \u201CV\u201D that contain community\
    \ gardens from the Department of Parks and Recreation\u2019s NYC Greenthumb Community\
    \ Gardens dataset. This is done to comply with Local Law 46 of 2020, which requires\
    \ that such lots be given a land use category of open space, outdoor recreation,\
    \ a community garden, or other similar description. Lots with a BUILDING CLASS\
    \ of QG are assigned to LAND USE CATEGORY \u201C09\u201D (Open Space & Outdoor\
    \ Recreation). This land use assignment is solely informational and does not confer\
    \ or change a legal status for such a tax lot.\n\nPTS contains two building classes\
    \ for some tax lots, with one of the building classes being Z7 (Easement). BUILDING\
    \ CLASS is only set to Z7 when it is the only PTS building class for the tax lot.\n\
    \nSee Appendix C - Building Class Codes for valid values\n"
  data_source: 'Department of City Planning - based on data from:

    Department of Finance - Property Tax System (PTS)

    '
  example: A1
  custom:
    readme_data_type: Alphanumeric - 2 characters
