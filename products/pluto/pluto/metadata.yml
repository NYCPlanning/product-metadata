- id: zonedist1
  display_name: zonedist1
  data_type: text
  description: "The zoning district classification of the tax lot. Under the Zoning\
    \ Resolution, the map of New York City is generally apportioned into three basic\
    \ zoning district categories: Residence (R), Commercial (C) and Manufacturing\
    \ (M), which are further divided into a range of individual zoning districts,\
    \ denoted by different number and letter combinations. In general, the higher\
    \ the number immediately following the first letter (R, C or M), the higher the\
    \ density or intensity of land use permitted.\n\nIf the tax lot is divided by\
    \ a zoning boundary line, ZONING DISTRICT 1 represents the zoning district classification\
    \ occupying the greatest percentage of the tax lot\u2019s area.\n\nFor example:\
    \ Tax lot 98 is divided by a zoning boundary line into part A and part B. Part\
    \ A, the largest portion of the lot, is in a commercial zoning district, while\
    \ part B is in a residential zoning district. ZONING DISTRICT 1 will contain the\
    \ commercial zoning district associated with part A.\n\nTax lots that intersect\
    \ with areas designated in NYC Zoning Districts as PARK, BALL FIELD, PLAYGROUND,\
    \ and PUBLIC SPACE are assigned a single value of PARK in PLUTO. The NYC Zoning\
    \ Districts do not constitute a definitive list of parks in the city. Lots designated\
    \ as PARK should not be used to calculate the amount of open space in an area.\n\
    \nSee SPLIT BOUNDARY INDICATOR to determine if the tax lot is divided.\n\nAbbreviation\
    \ Description\nR1-1 - R10H Residential Districts\nC1-6 - C8-4 Commercial Districts\n\
    M1-1 \u2013 M3-2 Manufacturing Districts\nM1-1/R5 \u2013 M1-6/R10 Mixed Manufacturing\
    \ & Residential Districts\nBPC Battery Park City\nPARK Areas designated as PARK,\
    \ BALL FIELD,\nPLAYGROUND and PUBLIC SPACE in NYC\nZoning Districts\n"
  data_source: Department of City Planning NYC GIS Zoning Features
  example: R5
  custom:
    readme_data_type: Alphanumeric - 9 characters
- id: zonedist2
  display_name: zonedist2
  data_type: text
  description: "If the tax lot is divided by zoning boundary lines, ZONING DISTRICT\
    \ 2 represents the zoning classification occupying the second greatest percentage\
    \ of the tax lot's area. Only zoning districts that cover at least 10% of a tax\
    \ lot\u2019s area are included.\n\nIf the tax lot is not divided by a zoning boundary\
    \ line, the field is blank.\n\nFor example: Tax lot 98 is divided by a zoning\
    \ boundary line into part A and part B. Part A, the larger portion of the lot,\
    \ is in a commercial zoning district, while part B is in a residential zoning\
    \ district. ZONING DISTRICT 2 will contain the residential zoning district associated\
    \ with part B.\n\nSee SPLIT BOUNDARY INDICATOR to determine if the tax lot is\
    \ divided.\n"
  data_source: Department of City Planning NYC GIS Zoning Features
  example: R6B
  custom:
    readme_data_type: Alphanumeric - 9 characters
- id: zonedist3
  display_name: zonedist3
  data_type: text
  description: "If the tax lot is divided by zoning boundary lines, ZONING DISTRICT\
    \ 3 represents the zoning classification occupying the third greatest percentage\
    \ of the tax lot's area. Only zoning districts that cover at least 10% of a tax\
    \ lot\u2019s area are included.\n\nIf the tax lot is not split between three zoning\
    \ districts, the field is blank.\n\nFor example: Tax lot 98 is divided by zoning\
    \ boundary lines into three sections - part A, part B and part C. Part A represents\
    \ the largest portion of the lot, part B is the second largest portion of the\
    \ lot, and part C covers the smallest portion of the tax lot. ZONING DISTRICT\
    \ 3 will contain the zoning associated with part C.\n\nSee SPLIT BOUNDARY INDICATOR\
    \ to determine if the tax lot is divided.\n"
  data_source: Department of City Planning NYC GIS Zoning Features
  example: R5
  custom:
    readme_data_type: Alphanumeric - 9 characters
- id: zonedist4
  display_name: zonedist4
  data_type: text
  description: "If the tax lot is divided by zoning boundary lines, ZONING DISTRICT\
    \ 4 represents\n\nthe zoning classification occupying the fourth greatest percentage\
    \ of the tax lot's area. Only zoning districts that cover at least 10% of a tax\
    \ lot\u2019s area are included.\n\nIf the tax lot is not split between four zoning\
    \ districts, the field is blank.\n\nFor example: Tax lot 98 is divided by zoning\
    \ boundary lines into four sections - part A, part B, part C and part D. Part\
    \ A represents the largest portion of the lot, part B is the second largest portion\
    \ of the lot, part C represents the third largest portion of the lot, and part\
    \ D covers the smallest portion of the tax lot. ZONING DISTRICT 4 will contain\
