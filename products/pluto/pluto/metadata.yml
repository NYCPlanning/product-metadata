- id: builtfar
  display_name: builtfar
  data_type: decimal
  description: 'The BUILT FLOOR AREA RATIO is the total building floor area divided
    by the area of the tax lot.


    This is an estimate by City Planning based on rough building area and lot area
    measurements provided by the Department of Finance.  BUILT FLOOR AREA RATIO is
    calculated using the TOTAL BUILDING FLOOR AREA and the LOT AREA.

    '
  data_source: "Department of City Planning \u2013 based on data from:\nDepartment\
    \ of Finance - Property Tax System (PTS)\n"
  example: '0.0000'
  custom:
    readme_data_type: Numeric - 7 digits (9999.99)
- id: residfar
  display_name: residfar
  data_type: decimal
  description: "The maximum allowable residential floor area ratio, based on the zoning\
    \ district classification occupying the greatest percentage of the tax lot\u2019\
    s area as reported in ZoneDist1. If the lot is assigned to more than one zoning\
    \ district and ZoneDist1 does not allow residential uses, MAXIMUM ALLOWABLE RESIDENTIAL\
    \ FAR is based on ZoneDist2, ZoneDist3 or ZoneDist4, in that order.\n\nThe maximum\
    \ allowable residential floor area ratios are exclusive of bonuses for plazas,\
    \ plaza-connected open areas, arcades, or other amenities.\n\nFor R2X, R3, R4,\
    \ and C3 zoning districts, ResidFAR does not include the attic allowance, under\
    \ which the FAR may be increased by up to 20% for the inclusion of space beneath\
    \ a pitched roof.\n\nFor properties zoned R6, R7, R7-1, R8 or R9, ResidFAR reflects\
    \ the maximum achievable floor area under ideal conditions.\n\nThe maximum allowable\
    \ floor area does not reflect Voluntary Inclusionary Housing or Mandatory Inclusionary\
    \ Housing Program floor area. See Appendix F and Section 23-154, paragraphs (b)\
    \ and (d) of the Zoning Resolution.\n\nFor properties in special mixed use districts,\
    \ PLUTO uses the wide street maximum allowable floor area ratio.  Since the maximum\
    \ allowable floor area ratio in mixed use special districts is actually determined\
    \ by whether the property is located on a wide street or a narrow street, users\
    \ should consult Section 23-153 of the Zoning Resolution.\n"
  data_source: Department of City Planning Zoning Division
  example: '0.50000000000'
  custom:
    readme_data_type: Numeric - 5 digits (99.99)
- id: commfar
  display_name: commfar
  data_type: decimal
  description: "The maximum allowable commercial floor area ratio, based on the zoning\
    \ district classification occupying the greatest percentage of the tax lot\u2019\
    s area as reported in ZoneDist1. If the lot is assigned to more than one zoning\
    \ district and ZoneDist1 does not allow commercial uses, MAXIMUM ALLOWABLE COMMERCIAL\
    \ FAR is based on ZoneDist2, ZoneDist3 or ZoneDist4, in that order.\n\nThe maximum\
    \ allowable commercial floor area ratios are exclusive of bonuses for plazas,\
    \ plaza-connected open areas, arcades, or other amenities.\n\nUsers should consult\
    \ Section 43-12 of the Zoning Resolution for more information.\n"
  data_source: Department of City Planning Zoning Division
  example: '0.00'
  custom:
    readme_data_type: Numeric - 5 digits (99.99)
- id: facilfar
  display_name: facilfar
  data_type: decimal
  description: "The maximum allowable community facility floor area ratio, based on\
    \ the zoning district classification occupying the greatest percentage of the\
    \ tax lot\u2019s area as reported in ZoneDist1. If the lot is assigned to more\
    \ than one zoning district and ZoneDist1 does not allow community facility uses,\
    \ MAXIMUM ALLOWABLE COMMUNITY FACILITY FAR is based on ZoneDist2, ZoneDist3 or\
    \ ZoneDist4, in that order.\n\nThe maximum allowable community facility floor\
    \ area ratios are exclusive of bonuses for plazas, plaza-connected open areas,\
    \ arcades, or other amenities.\n\nUsers should consult Section 24-11 of the Zoning\
    \ Resolution for more information.\n"
  data_source: Department of City Planning Zoning Division
  example: '2.00'
  custom:
    readme_data_type: Numeric - 5 digits (99.99)
- id: borocode
  display_name: borocode
  data_type: integer
  description: 'The borough in which the tax lot is located.


    Two portions of the city, Marble Hill and Rikers Island, are legally located in
    one borough but are serviced by a different borough. The BORO CODEs associated
    with these areas are the boroughs in which they are legally located.


    Marble Hill is serviced by the Bronx, but is legally located in Manhattan and
    has a BORO CODE of 1. Rikers Island is serviced by Queens, but is legally located
    in the Bronx and has a BORO CODE of 2.

    '
  data_source: Department of Finance - Property Tax System (PTS)
  example: '4'
  values:
  - value: '1'
    description: Manhattan
  - value: '2'
    description: Bronx
  - value: '3'
    description: Brooklyn
  - value: '4'
    description: Queens
  - value: '5'
    description: Staten Island
  custom:
    readme_data_type: Numeric - 1 digit (9)
- id: bbl
  display_name: BBL
  data_type: bbl
  description: 'A concatenation of the borough code, tax block and tax lot.


    This field consists of the borough code followed by the tax block followed by
    the tax lot.  The borough code is one numeric digit.  The tax block is one to
    five numeric digits, preceded with leading zeros when the block is less than five
    digits.  The tax lot is one to four digits and is preceded with leading zeros
    when the lot is less than four digits.


    For condominiums, the BBL is for the billing lot. See TAX LOT for more information
    on how condominiums are handled.


    Examples:

    Manhattan Borough Code 1, Tax Block 16, Tax Lot 100 would be stored as 1000160100.

    Brooklyn Borough Code 3, Tax Block 15828, Tax Lot 7501 would be stored as 3158287501.

    '
  data_source: 'Department of City Planning - based on data from:

    Department of Finance - Property Tax System (PTS)

    '
  checks:
    non_nullable: true
  example: '1016370141'
  custom:
    readme_data_type: Numeric - 10 digits
- id: condono
  display_name: condono
  data_type: integer
  description: 'The condominium number assigned to the complex.


    Condominium numbers are unique within a borough (see BOROUGH).

    '
  data_source: "Department of Finance \u2013 Property Tax System (PTS)"
  example: '100'
  custom:
    readme_data_type: Numeric - 5 digits
- id: tract2010
  display_name: tract2010
  data_type: text
  description: 'The 2010 census tract in which the tax lot is located.


    This field contains a one to four-digit census tract number and a two-digit suffix.  There
    is an implied decimal point between the census tract number and the suffix.  The
    census tract number is preceded with leading zeros when the tract is less than
    four digits.  If the tract has no suffix, CENSUS TRACT 2 contains 4 characters.


    2010 census tracts are geographic areas defined by the U.S. Census Bureau for
    the 2010 Census.


    Examples:

    Census Tract 203.01 would be stored as 020301

    Census Tract 23 would be stored as 0023

    '
  data_source: "Department of City Planning \u2013 Geosupport System"
  example: '226'
  custom:
    readme_data_type: Alphanumeric - 6 characters
- id: xcoord
  display_name: xcoord
  data_type: integer
  description: 'The X coordinate of the XY coordinate pair which depicts the approximate
    location of the lot.


    If the X coordinate is not available from Geosupport, it is calculated from the
