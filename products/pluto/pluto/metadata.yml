      federal government; a public authority; or a private institution
  - value: O
    description: "Other \u2013 owned by either a public authority or the state or\
      \ federal government"
  - value: P
    description: Private ownership
  - value: M
    description: Mixed city & private ownership
  custom:
    readme_data_type: Alphanumeric - 1 character
- id: ownername
  display_name: ownername
  data_type: text
  description: "The name of the owner of the tax lot.\n\nFor publicly owned tax lots,\
    \ owner names have been normalized. For example, \u201CNYC PARKS\u201D, \u201C\
    PARKS DEPARTMENT\u201D, and \u201CPARKS AND RECREATION (GENERAL)\u201D have been\
