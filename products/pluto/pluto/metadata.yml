    \ serve local retail needs (grocery stores, dry cleaners, restaurants, for example).\n\
    \nIf more than one commercial overlay exists on the tax lot, COMMERCIAL OVERLAY\
    \ 1 represents the commercial overlay occupying the greatest percentage of the\
    \ lot area. The commercial overlay district must either cover at least 10% of\
    \ a tax lot\u2019s area or at least 50% of the commercial overlay district must\
    \ be contained within the tax lot.\n\nIf the tax lot is does not contain a commercial\
