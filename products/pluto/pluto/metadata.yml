- id: assessland
  display_name: assessland
  data_type: decimal
  description: "The assessed land value for the tax lot.\n\nThe Department of Finance\
    \ calculates the assessed value by multiplying the tax lot\u2019s estimated full\
    \ market land value, determined as if vacant and unimproved, by a uniform percentage\
    \ for the property\u2019s tax class.\n\nAssessed and exempt values are updated\
    \ twice a year. Tentative values are released in mid-January and final values\
    \ are released around May 25. If the date on source file (PTS), as reported in\
    \ the Readme file, is between January 15 and May 25, ASSESSED LAND VALUE is from\
    \ the tentative roll for the tax year starting in July. Otherwise, ASSESSED LAND\
    \ VALUE is from the final roll.\n"
  data_source: Department of Finance - Property Tax System (PTS)
  example: '10080.00000'
  custom:
    readme_data_type: Numeric - 11 digits (99999999999)
- id: assesstot
  display_name: assesstot
  data_type: decimal
  description: "The assessed total value for the tax lot.\n\nThe Department of Finance\
    \ (DOF) calculates the assessed value by multiplying the tax lot\u2019s estimated\
    \ full market value by a uniform percentage for the property\u2019s tax class.\n\
    \nDOF values properties based on current and constructive use, rather than legal\
    \ use. The predominant active use, which determines the classification of a property,\
    \ is determined by square footage. If the second story of a three-story building\
    \ is mixed-use, an interior inspection may be necessary to establish the commercial\
    \ percentage of that story before reclassification.\u202FIn other cases, a two-story\
    \ building with retail on the first floor may have a sign identifying a second\
    \ story accounting office.\u202F If, for example, the second story is a primary\
    \ residence and there is a difference in square footage from the first to second\
    \ floor, the mere presence of a business sign does not confirm a predominant commercial\
    \ use.\n\nAdditional research is required to ensure proper classification.\u202F\
    \ This can include an internal inspection, speaking to someone at the location\
    \ or a neighbor, and researching various records (such as filed Real Property\
    \ Income and Expenses statements) from DOF or other city agencies.\n\nNYC Property\
    \ Tax Classes are determined by NYS and described under Real Property Tax Law\
    \ (RPTL) [Article \xA718-02](https://gcc02.safelinks.protection.outlook.com/?url=https%3A%2F%2Fwww.nysenate.gov%2Flegislation%2Flaws%2FRPT%2F1802&data=05%7C01%7CLSeirup%40planning.nyc.gov%7Cd62da5a4813248adc71e08dab374460e%7C32f56fc75f814e22a95b15da66513bef%7C0%7C0%7C638019609211103424%7CUnknown%7CTWFpbGZsb3d8eyJWIjoiMC4wLjAwMDAiLCJQIjoiV2luMzIiLCJBTiI6Ik1haWwiLCJXVCI6Mn0%3D%7C3000%7C%7C%7C&sdata=rr4wH48ewePfrBbuHeY18ewwelGkQVsF62Rs9tJbBj8%3D&reserved=0)\
    \ which mentions primary use for real property classification.\n\nProperty value\
    \ is assessed as of January 5th.  If a new building is not completed by April\
    \ 14th, the assessed building value is 0 and the Building Class reverts to Vacant.\n\
    \nAssessed and exempt values are updated twice a year. Tentative values are released\
    \ in mid-January and final values are released around May 25. If the date on source\
    \ file (PTS), as reported in the Readme file, is between January 15 and May 25,\
    \ ASSESSED TOTAL VALUE is from the tentative roll for the tax year starting in\
    \ July. Otherwise, ASSESSED TOTAL VALUE is from the final roll\n"
  data_source: Department of Finance - Property Tax System (PTS)
  example: '0.00000'
  custom:
    readme_data_type: Numeric - 11 digits (99999999999)
- id: exempttot
  display_name: exempttot
  data_type: decimal
  description: 'The exempt total value, which is determined differently for each exemption
    program, is the dollar amount related to that portion of the tax lot that has
    received an exemption.


    Assessed and exempt values are updated twice a year. Tentative values are released
    in mid-January and final values are released around May 25. If the date on source
    file (PTS), as reported in the Readme file, is between January 15 and May 25,
    EXEMPT TOTAL VALUE is from the tentative roll for the tax year starting in July.
    Otherwise, EXEMPT TOTAL VALUE is from the final roll.


    Note that New York State typically releases STAR exempt values right after the
    tentative roll is released. EXEMPT TOTAL VALUE will change to reflect these values
    after they are received.

    '
  data_source: Department of Finance - Property Tax System (PTS)
  example: '0.00000'
  custom:
    readme_data_type: Numeric - 11 digits (99999999999)
- id: yearbuilt
  display_name: yearbuilt
  data_type: integer
  description: "The year construction of the building was completed.\n\nIn general,\
    \ YEAR BUILT is accurate for the decade, but not necessarily for the specific\
    \ year. Between 1910 and 1985, the majority of YEAR BUILT values are in years\
    \ ending in 5 or 0. Many structures built between 1800s and early 1900s have a\
    \ YEAR BUILT between 1899 and 1901.\n\nFor ~26,000 buildings in historic districts,\
    \ YEAR BUILT has been changed to the date_high value from Landmarks Preservation\
    \ Commission\u2019s [Individual Landmark and Historic District Building Database](https://data.cityofnewyork.us/Housing-Development/LPC-Individual-Landmark-and-Historic-District-Buil/7mgd-s57w).\
    \ Any tax lot updated with LPC data has a value of 1 in field CHANGED BY DCP.\
    \ The original YEAR BUILT value can be found in PLUTOChangeFileYYv#.#.csv, where\
    \ YYv#.# is the version number.\n\nIf Year Built is null or 0, then the value\
    \ is unknown.\n"
  data_source: Department of Finance - Property Tax System (PTS)
  example: '1920'
  custom:
    readme_data_type: Numeric - 4 digits (9999)
- id: yearalter1
  display_name: yearalter1
  data_type: integer
  description: 'If a building has only been altered once, YEAR ALTERED 1 is the date
    that alteration began.


    If a building has been altered more than once, YEAR ALTERED 1 is the year of the
    second most recent alteration.


    The Department of Finance defines alterations as modifications to the structure
    that, according to the assessor, change the value of the real property.


    The date comes from Department of Buildings permits and may either be the actual
    date or an estimate.

    '
  data_source: Department of Finance - Property Tax System (PTS)
  example: '0'
  custom:
