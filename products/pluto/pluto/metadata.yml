- id: pluto_datadictionary.pdf
  filename: pluto_datadictionary.pdf
- id: pluto_readme.pdf
  filename: pluto_readme.pdf

columns:
- id: borough
  display_name: borough
  data_type: text
  description: 'The borough in which the tax lot is located. This field contains a
    two-character borough code.


    Two portions of the city, Marble Hill and Rikers Island, are legally located in
    one borough but are serviced by a different borough. The BOROUGH codes associated
    with these areas are the boroughs in which they are legally located. Marble Hill
    is serviced by the Bronx, but is legally located in Manhattan and has a BOROUGH
    of MN. Rikers Island is serviced by Queens, but is legally located in the Bronx
    and has a BOROUGH of BX.'
  data_source: 'Department of City Planning - based on data from:

    Department of Finance - Property Tax System (PTS)

    '
  example: QN
  values:
  - value: BK
    description: Brooklyn
  - value: BX
    description: Bronx
  - value: MN
    description: Manhattan
  - value: QN
    description: Queens
  - value: SI
    description: Staten Island
  custom:
    readme_data_type: Alphanumeric - 2 characters
- id: block
  display_name: Tax block
  data_type: integer
  description: 'The tax block in which the tax lot is located.

    This field contains a one to five-digit tax block number.

    Each tax block is unique within a borough (see BOROUGH).

    '
  data_source: Department of Finance - Property Tax System (PTS)
  checks:
    non_nullable: true
  example: '1637'
  custom:
    readme_data_type: Numeric - 5 digits (99999)
- id: lot
  display_name: Tax lot
  data_type: integer
  description: "The number of the tax lot.\n\nThis field contains a one to four-digit\
    \ tax lot number.\n\nEach tax lot is unique within a tax block (see TAX BLOCK).\n\
    \n<b>Special handling for condominiums:<b>\n\nIn a condominium complex, each condominium\
    \ unit is a separate tax lot and has its own lot number. In a residential condominium,\
    \ the condominium units are generally the individual apartments; in a commercial\
    \ condominium, the units might be floors in an office building, individual retail\
    \ shops, or blocks of office space. These unit lot numbers have values between\
    \ 1001 \u2013 6999.\n\nEach unit tax lot has an associated billing lot number,\
    \ with values between 7501 \u2013 7599. Lots in a condominium complex on the same\
    \ block will have the same billing lot number. To make condominium information\
    \ more compatible with parcel information, the Department of City Planning aggregates\
    \ condominium unit tax lot information to the billing lot. For example, if a residential\
    \ condominium building contains 20 units, the Department of Finance will assign\
    \ 20 unit lot numbers and each of these lot numbers will have the same billing\
    \ lot number. PLUTO will contain one record with the billing lot number and RESIDENTIAL\
    \ UNITS will be set to 20.\n\nIf the Department of Finance has not yet assigned\
    \ a billing lot number to the condominium complex, PLUTO uses the lowest unit\
    \ lot number within the complex.\n\nNote on MapPLUTO: The Department of Finance\
    \ Digital Tax Map (DTM) contains the geography of the base lot for condominiums.\
    \ The base lot is also called the \u201CFormerly Known As\u201D or FKA lot. For\
    \ most condominium complexes, there is one base lot per billing lot. In using\
    \ the DTM to create MapPLUTO, DCP replaces the base lot number with the billing\
    \ lot number. If there is more than one base lot with the same billing lot number,\
    \ DCP merges the base lots to create a geography for the billing lot.\n\nUnder\
    \ certain circumstances, DCP is unable to aggregate condominium unit tax lot information\
    \ to the billing lot or to the lowest unit lot number. This occurs when a CONDOMINIUM\
    \ NUMBER has not yet been assigned to the unit lots in PTS. In most cases, these\
    \ unit lots will appear in PLUTO and in the NOT_MAPPED_LOTS table that is released\
    \ with MapPLUTO. Before including these unit lots, the data is checked to verify\
    \ that it pertains only to the unit lot. If unit lots have an identical address\
    \ and a value for RESIDENTIAL UNITS that is greater than 1 and the same for all\
    \ records, and there is no matching BBL in the DTM, they are assumed to part of\
    \ the same condominium. BUILDING AREA is checked in the same way. These unit lots\
    \ are removed from PLUTO and NOT_MAPPED_LOTS to avoid overcounting the number\
    \ of residential units and building area."
  data_source: Department of Finance - Property Tax System (PTS)
  checks:
    non_nullable: true
  example: '141'
  custom:
    readme_data_type: Numeric - 4 digits (9999)
- id: cd
  display_name: community board
  data_type: integer
  description: "The community district (CD) or joint interest area (JIA) for the tax\
    \ lot. The city is divided into 59 community districts and 12 joint interest areas,\
    \ which are large parks or airports that are not considered part of any community\
    \ district.\n\nThis field consists of three digits, the first of which is the\
    \ borough code (see BORO CODE). The second and third digits are the community\
    \ district or joint interest area number, whichever is applicable.\n\nJoint interest\
    \ areas:\nBOROUGH JIA NAME\nManhattan 164 Central Park\nBronx\n226 Van Cortlandt\
    \ Park\n227 Bronx Park\n228 Pelham Bay Park\nBrooklyn 355 Prospect Park\n356 Gateway\
    \ National Recreation Area\nQueens\n480 LaGuardia Airport\n481 Flushing Meadow/Corona\
    \ Park\n482 Forest Park\n483 JFK International Airport\n484 Gateway National Recreation\
    \ Area\nStaten Island 595 Gateway National Recreation Area\n\nTwo portions of\
    \ the city, Marble Hill and Rikers Island, are legally located in one borough,\
    \ but serviced by a different borough. The COMMUNITY DISTRICT associated with\
    \ these areas is the community district by which they are serviced.\n\nMarble\
    \ Hill is legally located in Manhattan, but is serviced by the Bronx and is divided\
    \ between community districts 207 and 208. Rikers Island is legally located in\
    \ the Bronx, but is serviced by Queens and is part of community district 401.\n\
    \nCOMMUNITY DISTRICT contains the value returned by Geosupport for one of the\
    \ addresses assigned to the lot. If Geosupport does not return a value, COMMUNITY\
    \ DISTRICT is calculated spatially using the tax lot\u2019s XY COORDINATES and\
    \ DCP\u2019s Administrative District Base Map files.\n"
  data_source: Department of City Planning
  example: '111'
  custom:
    readme_data_type: Numeric - 3 digits (999)
- id: ct2010
  display_name: census tract 2010
  data_type: text
  description: "The 2010 census tract in which the tax lot is located.\n\nThis field\
    \ contains a one to four-digit census tract number, sometimes with a decimal point\
    \ and a two-digit suffix.\n\n2010 census tracts are geographic areas defined by\
    \ the U.S. Census Bureau for the\n2010 Census. Census tracts are comprised of\
    \ census blocks.\n\nEach census tract is unique within a borough (see BOROUGH).\n\
    \nExamples:\n   Census Tract 203.01\n   Census Tract 23\n\nCENSUS TRACT 2010 contains\
    \ the value returned by Geosupport for one of the addresses assigned to the lot.\
    \ If Geosupport does not return a value, CENSUS TRACT 2010 is calculated spatially\
    \ using the tax lot\u2019s XY COORDINATES and DCP\u2019s Administrative District\
    \ Base Map files.\n"
  data_source: "Department of City Planning \u2013 Geosupport System\nDepartment of\
    \ City Planning \u2013 Administrative District Base Map files\n"
  example: '226'
  custom:
    readme_data_type: Alphanumeric - 7 characters
- id: cb2010
  display_name: cb2010
  data_type: text
  description: "The 2010 census block in which the tax lot is located.\n\nThis field\
    \ contains a four-digit census block number and, when applicable, a one- character\
    \ alphabetic suffix.\n\n2010 census blocks are the smallest geographic areas defined\
    \ by the U.S. Census Bureau.\n\nEach census block number is unique within a census\
    \ tract (see CENSUS TRACT).\n\nExamples:\n   Census Block 101A\n   Census Block\
    \ 102\n"
  data_source: "Department of City Planning \u2013 Geosupport System\nDepartment of\
    \ City Planning \u2013 Administrative District Base Map files\n"
  example: '1000'
  custom:
    readme_data_type: Alphanumeric - 5 characters
- id: schooldist
  display_name: schooldist
  data_type: integer
  description: "The school district in which the tax lot is located.\n\nThis field\
    \ contains a two-digit school district number, which is preceded with a zero when\
    \ the district number is one digit.\n\nThe city is divided up into 34 school districts.\
    \ Those districts are then divided into smaller zones which determine the area\
    \ served by local schools. Each district has its own superintendent and receives\
    \ guidance from a Community District Education Council made up of parents and\
    \ local representatives.\n\nSCHOOL DISTRICT contains the value returned by Geosupport\
    \ for one of the addresses assigned to the lot. If Geosupport does not return\
    \ a value, SCHOOL DISTRICT is calculated spatially using the tax lot\u2019s XY\
    \ COORDINATES and DCP\u2019s Administrative District Base Map files.\n"
  data_source: "Department of City Planning \u2013 Geosupport System\nDepartment of\
    \ City Planning \u2013 Administrative District Base Map files\n"
  example: '31'
  custom:
    readme_data_type: Alphanumeric - 2 characters
- id: council
  display_name: council district
  data_type: integer
  description: 'The city council district in which the tax lot is located.


    This field contains a two-digit city council district number, which is preceded
    with a zero when the district number is one digit.


    There are currently 51 city council districts in the City, which serve as political
    districts for the legislative branch of city government.

    '
  data_source: "Department of City Planning \u2013 Geosupport System\nDepartment of\
    \ City Planning \u2013 Administrative District Base Map files\n"
  example: '51'
- id: zipcode
  display_name: postcode
  data_type: integer
  description: 'A ZIP code that is valid for one of the addresses assigned to the
    tax lot.


    Note that a tax lot may have multiple addresses and these addresses may not have
    the same ZIP code. A building with entrances on two streets may have a different
    ZIP code for each street address. ZIP CODE may not be valid for the street address
    in ADDRESS.


    If a tax lot does not have an ADDRESS or the ADDRESS contains a street name without
    a house number, ZIP CODE will be blank.

    '
  data_source: "Department of City Planning \u2013 Geosupport System"
  example: '10314'
  custom:
    readme_data_type: Alphanumeric - 5 characters
- id: firecomp
  display_name: firecomp
  data_type: text
  description: "The fire company that services the tax lot.\n\nThis field consists\
    \ of four characters, the first of which is an alphabetic code identifying the\
    \ type of fire company, where E stands for Engine, L stands for Ladder and Q stands\
    \ for Squad. The type code is followed by a one to three- digit fire company number\
    \ which is preceded with leading zeros if the company number is less than three\
    \ digits.\n\nFIRE COMPANY contains the value returned by Geosupport for one of\
    \ the addresses assigned to the lot. If Geosupport does not return a value, FIRE\
    \ COMPANY is calculated spatially using the tax lot\u2019s XY COORDINATES and\
    \ DCP\u2019s Administrative District Base Map files. data_type: text\n"
