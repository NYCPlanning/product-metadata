id: primary_land_use_tax_lot_output_pluto

attributes:
  description: "Extensive land use and geographic data at the tax lot level in comma\u2013\
    separated values (CSV) file format. The PLUTO files contain more than seventy\
    \ fields derived from data maintained by city agencies.\nAll previously released\
    \ versions of this data are available at <a href=\"https://www.nyc.gov/site/planning/data-maps/open-data/bytes-archive.page?sorts%5Byear%5D=0\"\
    >BYTES of the BIG APPLE- Archive</a>"
  display_name: Primary Land Use Tax Lot Output (PLUTO)
  each_row_is_a: Tax Lot
  tags:
  - primary land use tax lot output
  - pluto
  - parcels
  - tax lot
  - tax block
  - zoning
  - land use
  - department of city planning
  - dcp
  - new york city
  - nyc

