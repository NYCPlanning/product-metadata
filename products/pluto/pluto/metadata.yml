- id: ownertype
  display_name: ownertype
  data_type: text
  description: "A code indicating type of ownership for the tax lot.\n\nOnly one data\
    \ source is used per tax lot.\n\nThe COLP file, which contains more accurate and\
    \ specific type of city ownership data than PTS, is used when data is available\
    \ for that lot. Codes C, M, O, P are derived from COLP.\n\nIf the tax lot is not\
    \ in COLP, PTS is checked to see if the lot\u2019s EXEMPT TOTAL VALUE equals its\
    \ ASSESSED TOTAL VALUE. If the two values are the same, the lot is given a code\
    \ of X. Otherwise the tax lot is not given any TYPE OF OWNERSHIP CODE.\n\nOWNER\
    \ NAME should be referenced to verify type of ownership, particularly when it\u2019\
    s important to distinguish between state, federal, and public authority ownership.\n"
  data_source: 'Department of City Planning - City Owned and Leased Properties (COLP)

    Department of Finance - Property Tax System (PTS)

    '
