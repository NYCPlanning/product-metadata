    half of the footprint, the number of floors would be 2.5.


    Above ground basements are not included in the NUMBER OF FLOORS.


    A roof used for parking, farming, playground, etc. is not included in NUMBER OF
    FLOORS.


    If the NUMBER OF FLOORS is null and the NUMBER OF BUILDINGS is greater than zero,
    then NUMBER OF FLOORS is not available for the tax lot.

