- id: lotarea
  display_name: lotarea
  data_type: integer
  description: "Total area of the tax lot, expressed in square feet rounded to the\
    \ nearest integer.\n\nLOT AREA contains street beds when the tax lot contains\
    \ \u201Cpaper streets\u201D i.e., streets mapped but not built.\n\nIf the tax\
    \ lot is not an irregularly shaped lot (see IRREGULAR LOT CODE) the Department\
    \ of Finance calculates the LOT AREA by multiplying the LOT FRONTAGE by the LOT\
    \ DEPTH. If the tax lot is irregularly shaped, DOF calculates the LOT AREA from\
    \ the Digital Tax Map.\n\nIf PTS contains a zero value for LOT AREA, this field\
    \ is changed to show the area of the tax lot\u2019s geometric shape in the Digital\
    \ Tax Map and DCPEdited is set to \u201C1\u201D. (see CHANGED BY DCP).\n"
  data_source: "Department of Finance - Property Tax System (PTS)\nDepartment of City\
    \ Planning - based on data from:\nDepartment of Finance \u2013 Digital Tax Map\
    \ (DTM)\n"
  example: '2000'
  custom:
    readme_data_type: Numeric - 9 digits (999999999)
- id: bldgarea
  display_name: bldgarea
  data_type: integer
  description: "The total gross area in square feet, except for condominium measurements\
    \ which come from the Condo Declaration and are net square footage not gross.\n\
    \nTOTAL BUILDING FLOOR AREA is populated in the following order of preference:\n\
    \  1. Gross floor area from PTS\n  2. Gross floor area from CAMA\n  3. Calculated\
    \ from the PTS building dimensions and number of stories for the primary building\
    \ on the lot. TOTAL BUILDING FLOOR AREA calculated by this method will not include\
    \ floor area for any other buildings on the lot.\n  4. TOTAL BUILDING FLOOR AREA\
    \ is set to zero if the building class starts with \u201CV\u201D and the number\
    \ of buildings is zero.\n\nSee TOTAL BUILDING FLOOR AREA SOURCE CODE to determine\
    \ which method was used.\n\nIf TOTAL BUILDING FLOOR AREA SOURCE CODE has a value\
    \ of 2 (PTS) or 7 (CAMA), the TOTAL BUILDING FLOOR AREA is based on gross building\
    \ area, also known as total gross square feet. For these data sources, the TOTAL\
    \ BUILDING FLOOR AREA is for all of the structures on the tax lot, including stairwells,\
    \ halls, elevator shafts, attics and extensions such as attached garages. Measurements\
    \ are based on exterior dimensions and take into account setbacks.\n\nIf the TOTAL\
    \ BUILDING FLOOR AREA SOURCE CODE field has a value of 5, the floor area was calculated\
    \ from the DOF Property Tax System (PTS) using the building dimensions and number\
    \ of stories for ONLY the largest structure on the tax lot.\n\nIn all cases, this\
    \ is a rough estimate of the gross building floor area and does not necessarily\
    \ take into account all the criteria for calculating floor area as defined in\
    \ section 12-10 of the Zoning Resolution.\n\nRoof areas used for parking/garden/playground\
    \ are not included in the floor area.\n\nIf TOTAL BUILDING FLOOR AREA SOURCE CODE\
    \ is 2, TOTAL BUILDING FLOOR AREA contains the common area for condominiums.\n\
    \nIf FLOOR AREA, TOTAL BUILDING SOURCE CODE is 7, TOTAL BUILDING FLOOR AREA does\
    \ not include below grade finished basements.\n\nIf the basement in a one, two\
    \ or three family structure is above grade and finished, its square footage is\
    \ included in TOTAL BUILDING FLOOR AREA.\n\nA TOTAL BUILDING FLOOR AREA of zero\
    \ can mean it is either not available or not applicable. If NUMBER OF BUILDINGS\
