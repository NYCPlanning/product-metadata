id: projects

attributes:
  description: 'The Capital Projects Database reports information at the project level
    on discrete capital investments from the Capital Commitment Plan.Each row is uniquely
    identified by its Financial Management Service (FMS) ID, and contains data pertaining
    to the sponsoring and managing agency.


    To explore the data, please visit  <a href="https://capitalplanning.nyc.gov/map#10/40.7128/-74.0807">Capital
    Planning Explorer</a>


    For additional information, please visit  <a href="https://www.ibo.nyc.ny.us/iboreports/IBOCBG.pdf">A
    Guide to The Capital Budget</a>

    '
  display_name: Capital Projects Database (CPDB) - Projects
  each_row_is_a: Capital Project
  tags:
  - capital projects database
  - capital planning
  - cpdb
  - budget
  - omb

assembly: []

destinations:
- id: socrata_projects
  type: socrata
  files:
