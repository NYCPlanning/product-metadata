id: health_center_districts

attributes:
  description: 'Health Center Districts - by Department of City Planning.


    All previously released versions of this data are available at <a href="https://www.nyc.gov/site/planning/data-maps/open-data/bytes-archive.page?sorts%5Byear%5D=0">BYTES
    of the BIG APPLE- Archive</a>.

    '
  display_name: Health Center Districts
  each_row_is_a: Health Center District
  tags:
  - 'gis data: boundaries of health districts'

assembly: []

destinations:
- id: socrata
  type: socrata
  files:
  - id: nyhc_metadata.pdf
    custom:
      destination_use: attachment
  - id: primary_shapefile
    custom:
      destination_use: dataset_file
  custom:
    four_four: 6nss-v3ep

files:
- id: primary_shapefile
  filename: nyhc.zip
  type: shapefile
  overrides:
    overridden_columns:
    - id: boro_code
      custom:
        name: borocode
    - id: boro_name
      custom:
        name: boroname
    - id: health_center_district
      custom:
        name: hcentdist
    - id: shape_length
      custom:
        name: shape_leng
- id: nyhc_metadata.pdf
  filename: nyhc_metadata.pdf

columns:
- id: boro_code
  display_name: BoroCode
  data_type: integer
  description: Borough code for the borough in which the census block is located.
  example: None
  values:
  - value: '1'
    description: Manhattan
  - value: '2'
    description: Bronx
  - value: '3'
    description: Brooklyn
  - value: '4'
    description: Queens
  - value: '5'
    description: Staten Island
- id: boro_name
  display_name: BoroName
  data_type: text
  description: Borough Name.
  example: Queens
  values:
  - value: Brooklyn
  - value: Bronx
  - value: Manhattan
  - value: Queens
  - value: Staten Island
- id: health_center_district
  display_name: HealthCenterDistrict
  data_type: integer
  description: Denotes the Health Center number
  example: None
- id: shape_area
  display_name: Shape_Area
  data_type: decimal
  example: None
- id: shape_length
  display_name: Shape_Length
  data_type: decimal
  example: None
- id: the_geom
  display_name: Shape
  data_type: geometry
  example: None
