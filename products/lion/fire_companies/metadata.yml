id: fire_companies

attributes:
  description: 'GIS data: Boundaries of Fire Companies.


    All previously released versions of this data are available at <a href="https://www.nyc.gov/site/planning/data-maps/open-data/bytes-archive.page?sorts%5Byear%5D=0">BYTES
    of the BIG APPLE- Archive</a>.

    '
  display_name: Fire Companies
  each_row_is_a: Fire Company
  tags:
  - fire companies
  - dcp
  - public safety
  - fdny

assembly: []

destinations:
- id: socrata
  type: socrata
  files:
  - id: nyfc_metadata.pdf
    custom:
      destination_use: attachment
  - id: shapefile
    custom:
      destination_use: dataset_file
  custom:
    four_four: qzxy-jtkb

files:
- id: shapefile
  filename: nyfc.zip
  type: shapefile
  overrides:
    overridden_columns:
    - id: shape_length
      custom:
        name: shape_leng
    - id: fire_company_type
      custom:
        name: firecotype
    - id: fire_company_number
      custom:
        name: fireconum
    - id: fire_battalion
      custom:
        name: firebn
    - id: fire_division
      custom:
        name: firediv
- id: nyfc_metadata.pdf
  filename: nyfc_metadata.pdf

columns:
- id: fire_company_type
  display_name: FireCoType
  data_type: text
  description: Denotes whether the company is an engine company, ladder company or
    squad.
  example: None
  values:
  - value: L
    description: Ladder Company
  - value: E
    description: Engine Company
  - value: Q
    description: Fire Squad
- id: fire_company_number
  display_name: FireCoNum
  data_type: integer
  description: The company number servicing the district
  example: None
- id: fire_division
  display_name: FireDiv
  data_type: text
  description: The division number servicing the district
  example: None
- id: fire_battalion
  display_name: FireBN
  data_type: integer
  description: The battalion number servicing the district
  example: None
- id: the_geom
  display_name: Shape
  data_type: geometry
  example: None
- id: shape_length
  display_name: Shape_Length
  data_type: decimal
  example: None
- id: shape_area
  display_name: Shape_Area
  data_type: decimal
  example: None
