id: lion_differences_file

attributes:
  description: 'The LION Differences File (LDF) documents segment and node level changes
    that have occurred in the LION file between two subsequent releases. This file
    allows a user who "ties" organizational data to DCP''s Segment ID and/or Node
    ID to migrate their data appropriately when these changes occur.

    All previously released versions of this data are available at <a href="https://www.nyc.gov/site/planning/data-maps/open-data/bytes-archive.page?sorts%5Byear%5D=0">BYTES
    of the BIG APPLE- Archive</a>.

    '
  display_name: LION Differences File
  each_row_is_a: Changed Segment or Node
  tags:
  - node
  - street
  - street name
  - intersection
  - segment
  - lion
  - ldf
  - change

assembly: []

destinations:
- id: socrata
  type: socrata
  files:
  - id: ldf_metadata.pdf
    custom:
      destination_use: attachment
  - id: primary_shapefile
    custom:
      destination_use: dataset_file
  custom:
    four_four: ige5-v6sk
    is_unparsed_dataset: true

files:
- id: primary_shapefile
  filename: ldf.zip
  type: shapefile
- id: ldf_metadata.pdf
  filename: ldf_metadata.pdf

columns: []
