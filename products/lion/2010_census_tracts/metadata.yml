id: 2010_census_tracts

attributes:
  description: '2010 Census Tracts from the US Census for New York City. These boundary
    files are derived from the US Census Bureau''s TIGER data products and have been
    geographically modified to fit the New York City base map.

    All previously released versions of this data are available at <a href="https://www.nyc.gov/site/planning/data-maps/open-data/bytes-archive.page?sorts%5Byear%5D=0">BYTES
    of the BIG APPLE- Archive</a>.

    '
  display_name: 2010 Census Tracts
  each_row_is_a: Census Tract
  tags:
  - 2010 census tracts (water areas included)
  - dcp
  - city planning
  - census
  - water areas

assembly: []

