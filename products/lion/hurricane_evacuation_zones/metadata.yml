id: hurricane_evacuation_zones

attributes:
  description: '"Hurricane Evacuation Zones are determined by New York City Emergency
    Management and represent varying threat levels of coastal flooding resulting from
    storm surge. Hurricane evacuation zones should not be confused with flood insurance
    risk zones, which are designated by FEMA and available in the form of Flood Insurance
    Rate Maps (FIRMs).


    All previously released versions of this data are available at <a href="https://www.nyc.gov/site/planning/data-maps/open-data/bytes-archive.page?sorts%5Byear%5D=0">BYTES
    of the BIG APPLE- Archive</a>.

    '
  display_name: Hurricane Evacuation Zones
  each_row_is_a: Hurricane Evacuation Zone
  tags:
  - nycem
  - evacuation
  - hurricane
  - zones

