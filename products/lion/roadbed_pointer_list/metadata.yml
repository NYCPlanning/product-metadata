id: roadbed_pointer_list

attributes:
  description: 'A text file representing the relationships between generic and roadbed
    segments (or roadbed terminators segments that represent the merging of divided
    roadbeds back into each other as a single roadbed or undivided street) by segment
    ID.


    All previously released versions of this data are available at <a href="https://www.nyc.gov/site/planning/data-maps/open-data/bytes-archive.page?sorts%5Byear%5D=0">BYTES
    of the BIG APPLE- Archive</a>.

    '
  display_name: Roadbed Pointer List (RPL)
  each_row_is_a: Roadbed Pointer

assembly: []

destinations:
- id: socrata
  type: socrata
  files:
  - id: rpl_filelayout.pdf
    custom:
      destination_use: attachment
  - id: primary_shapefile
    custom:
      destination_use: dataset_file
  custom:
    four_four: qs4p-vs2w
    is_unparsed_dataset: true

files:
- id: primary_shapefile
  filename: rpl.zip
  type: shapefile
- id: rpl_filelayout.pdf
  filename: rpl_filelayout.pdf

columns: []
