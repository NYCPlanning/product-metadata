id: street_name_dictionary

attributes:
  description: 'The Street Name Dictionary (SND) contains street names and street
    codes for New York City.  Street names (which include names of other geographic
    features as well) are associated to street codes.  Alias street names and variant
    spellings are related through a street code hierarchy.


    All previously released versions of this data are available at <a href="https://www.nyc.gov/site/planning/data-maps/open-data/bytes-archive.page?sorts%5Byear%5D=0">BYTES
    of the BIG APPLE- Archive</a>

    '
  display_name: Street Name Dictionary
  each_row_is_a: Street Name
  tags:
  - dcp
  - street
  - street name
  - street code
  - dictionary
  - snd
  - geographic
  - intersection

assembly: []

