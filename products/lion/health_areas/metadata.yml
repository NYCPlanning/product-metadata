id: health_areas

attributes:
  description: 'GIS data: Boundaries of Health Areas.


    All previously released versions of this data are available at <a href="https://www.nyc.gov/site/planning/data-maps/open-data/bytes-archive.page?sorts%5Byear%5D=0">BYTES
    of the BIG APPLE- Archive</a>.

    '
  display_name: Health Areas
  each_row_is_a: Health Area
  tags:
  - health areas
  - dcp
  - health
  - city planning

assembly: []

destinations:
- id: socrata
  type: socrata
  files:
  - id: nyha_metadata.pdf
    custom:
      destination_use: attachment
  - id: primary_shapefile
    custom:
      destination_use: dataset_file
  custom:
    four_four: jntv-ngw5

files:
- id: primary_shapefile
  filename: nyha.zip
  type: shapefile
  overrides:
    overridden_columns:
    - id: boro_code
      custom:
        name: borocode
    - id: boro_name
      custom:
        name: boroname
    - id: health_area
      custom:
        name: healtharea
    - id: shape_length
      custom:
        name: shape_leng
- id: nyha_metadata.pdf
  filename: nyha_metadata.pdf

columns:
- id: boro_code
  display_name: BoroCode
  data_type: integer
  description: Borough code for the borough in which the census block is located.
  example: None
  values:
  - value: '1'
    description: Manhattan
  - value: '2'
    description: Bronx
  - value: '3'
    description: Brooklyn
  - value: '4'
    description: Queens
  - value: '5'
    description: Staten Island
- id: boro_name
  display_name: BoroName
  data_type: text
  description: Borough Name.
  example: Queens
  values:
  - value: Brooklyn
  - value: Bronx
  - value: Manhattan
  - value: Queens
  - value: Staten Island
- id: health_area
  display_name: HealthArea
  data_type: integer
  example: None
- id: shape_area
  display_name: ShapeArea
  data_type: decimal
  example: None
- id: shape_length
  display_name: ShapeLength
  data_type: decimal
  example: None
- id: the_geom
  display_name: Shape
  data_type: geometry
  example: None
