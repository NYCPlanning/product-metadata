id: property_address_directory

attributes:
  description: 'The PAD (Property Address Directory) file contains additional geographic
    information at the tax lot level not found in the PLUTO files.  This data includes
    alias addresses and Building Identification Numbers (BINs).  It consists of two
    ASCII, comma delimited files: a tax lot file and an address file.


    All previously released versions of this data are available at <a href="https://www.nyc.gov/site/planning/data-maps/open-data/bytes-archive.page?sorts%5Byear%5D=0">BYTES
    of the BIG APPLE- Archive</a>.

    '
  display_name: Property Address Directory
  each_row_is_a: Property Address
  tags:
  - dcp
  - pad
  - property address directory
  - lot
  - tax lot
  - building
  - city planning
  - planning
  - block

assembly: []

destinations:
- id: socrata
  type: socrata
  files:
  - id: padlayout.pdf
    custom:
      destination_use: attachment
  - id: primary_shapefile
    custom:
      destination_use: dataset_file
  custom:
    four_four: bc8t-ecyu
    is_unparsed_dataset: true

files:
