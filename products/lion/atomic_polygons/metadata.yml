id: atomic_polygons

attributes:
  description: 'Atomic polygons serve as a set of basic building blocks for generating
    the polygons of many of the district types represented in the CSCL database. Feature
    classes such as election district, school district, census block, FDNY administrative
    company, and community district can be dissolved by combining the appropriate
    fields in atomic polygons.


    All previously released versions of this data are available at <a href="https://www.nyc.gov/site/planning/data-maps/open-data/bytes-archive.page?sorts%5Byear%5D=0">BYTES
    of the BIG APPLE- Archive</a>.

    '
  display_name: Atomic Polygons
  each_row_is_a: Atomic Polygon
  tags:
  - atomic polygons

assembly: []

destinations:
- id: socrata
  type: socrata
  files:
  - id: primary_shapefile
    custom:
      destination_use: dataset_file
  custom:
    four_four: k4qs-rbku

files:
- id: primary_shapefile
  filename: nyap.zip
  type: shapefile
  overrides:
    overridden_columns:
    - id: admin_fire_company
      custom:
        name: admin_fire
    - id: commercial_waste_zone
      custom:
        name: commercial
    - id: hurricane_evacuation_zone
      custom:
        name: hurricane_
    - id: censusblock_2000
      custom:
        name: censusbloc
    - id: censusblock_2000_suffix
      custom:
        name: censusbl_1
    - id: censustract_2000
      custom:
        name: censustrac
    - id: censusblock_2010
      custom:
        name: censusbl_2
    - id: censusblock_2010_suffix
      custom:
        name: censusbl_3
    - id: censustract_2010
      custom:
        name: censustr_1
    - id: censustract_1990
      custom:
        name: censustr_2
    - id: censustract_2020
      custom:
        name: censustr_3
    - id: censusblock_2020
      custom:
        name: censusbl_4
    - id: censusblock_2020_suffix
      custom:
        name: censusbl_5
    - id: shape_length
      custom:
        name: shape_leng
- id: nyap_metadata.pdf
  filename: nyap_metadata.pdf

