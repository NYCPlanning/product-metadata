      - id: mapbbl
        display_name: BILLBBL
        custom:
          api_name: billbbl
      - id: cd
        display_name: CD
      - id: hnum
        display_name: HOUSE NUMBER
        custom:
          api_name: house_number
      - id: sname
        display_name: STREET NAME
        custom:
          api_name: street_name
      - id: address
        display_name: ADDRESS
      - id: parcelname
        display_name: PARCEL NAME
        custom:
