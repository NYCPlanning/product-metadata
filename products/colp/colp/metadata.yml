columns:
- id: uid
  display_name: Unique ID
  data_type: text
  description: Unique identifier created from a hash of all fields for the record
    on the IPIS source file. As long as no fields change on the record, this identifier
    is static between versions of COLP.
  data_source: Department of City Planning
  checks:
    is_primary_key: true
  example: cbe20732be28f6ab445289d7a67bb241
- id: borough
  display_name: Borough
  data_type: text
  description: "NYC borough \u2013 1 (Manhattan), 2 (Bronx), 3 (Brooklyn), 4 (Queens),\
    \ 5 (Staten Island)"
  checks:
    non_nullable: true
  example: None
  values:
  - value: '1'
    description: Manhattan
  - value: '2'
    description: Bronx
  - value: '3'
    description: Brooklyn
  - value: '4'
    description: Queens
  - value: '5'
    description: Staten Island
- id: block
  display_name: Tax block
  data_type: integer
  description: The tax block in which the tax lot is located. Each tax block is unique
    within a borough.
  checks:
    non_nullable: true
  example: '1637'
- id: lot
  display_name: Tax lot
  data_type: integer
  description: The number of the tax lot. Each tax lot is unique within a tax block.
  checks:
    non_nullable: true
  example: '141'
- id: bbl
  display_name: BBL
  data_type: bbl
  description: 10-digit identifier for a tax lot, consisting of the borough code followed
    by the tax block followed by the tax lot. The borough code is one numeric digit.
    The tax block is one to five numeric digits, preceded with leading zeros when
    the block is less than five digits. The tax lot is one to four digits and is preceded
    with leading zeros when the lot is less than four digits. For condominiums, this
    is usually the unit BBL.
  checks:
    non_nullable: true
  example: '1016370141'
  custom:
    readme_data_type: double
- id: mapbbl
  display_name: Mapped BBL
  data_type: bbl
  description: "The mapped BBL is the BBL used to map the record. For condominium\
    \ lots, the mapped BBL is the billing BBL, which is the 75nn-series record shown\
    \ on the tax map and in MapPLUTO. It is generally associated with the condominium\
    \ management organization. For air rights lots, the mapped BBL is the donating\
    \ BBL from the Air_Rights_Lot table in the Department of Finance\u2019s Digital\
    \ Tax Map. If there is more than one donating BBL, the one whose lot number most\
    \ closely matches that of the air rights lot is used. For all other lots, MAPBBL\
    \ is the same as BBL."
  data_source: Department of City Planning - Geosupport
  example: '1016370141'
  custom:
    readme_data_type: double
- id: cd
  display_name: Community district
  data_type: integer
  description: The community district or joint interest area for the tax lot. The
    city is divided into 59 community districts and 12 joint interest areas, which
    are large parks or airports that are not considered part of any community district.
    This field consists of three digits, the first of which is the borough code. The
    second and third digits are the community district or joint interest area number,
    whichever is applicable.
  data_source: Department of City Planning
  example: '111'
- id: hnum
  display_name: House number
  data_type: text
  description: House number
  example: '1955'
- id: sname
  display_name: Street name
  data_type: text
  description: Name of the street
  example: Third Avenue
- id: address
  display_name: Address
  data_type: text
  description: House number and street name
  example: 1955 Third Avenue
- id: parcelname
  display_name: Parcel name
  data_type: text
  description: "Name of the parcel or facility on the lot. DCP applies some modifications\
    \ to parcel names to improve readability. Some abbreviations are expanded programmatically.\
    \ Other modifications are made after manual research. For the latter, DCPEDITED\
    \ = \u201CY\u201D."
  example: AGUILAR BRANCH LIBRARY
- id: agency
  display_name: Agency
  data_type: text
  description: Abbreviation for agency or entity using the lot. See appendix A for
    a list of abbreviations with their full name.
  example: NYPL
- id: usecode
  display_name: Use code
  data_type: text
  description: The use code indicates how the lot is being used by the agency. See
    Appendix B for a complete list of use codes and descriptions.
  example: '218'
- id: usetype
  display_name: Use description
  data_type: text
  description: Description of how the lot is being used by the agency. See Appendix
    B for a complete list of use codes and descriptions.
  example: BRANCH LIBRARY
- id: ownership
  display_name: Owner type
  data_type: text
  description: Type of owner
  checks:
    non_nullable: true
  example: None
  values:
  - value: C
    description: City owned
  - value: M
    description: Mixed ownership
  - value: P
    description: Private
  - value: O
    description: Other/public authority (includes properties owned by federal and
      state entities)
- id: category
  display_name: Category
  data_type: integer
  description: Category classifies lots as non-residential properties with a current
    use, residential properties, or properties without a current use.
  data_source: Department of City Planning
  checks:
    non_nullable: true
  example: None
  values:
  - value: '1'
    description: Non-residential properties with a current use
  - value: '2'
    description: Residential properties
  - value: '3'
    description: Properties with no current use
- id: expandcat
  display_name: Expanded category
  data_type: integer
  description: "This categorization classifies records into broad groups based on\
    \ use. Valid values are 1 \u2013 9."
  data_source: Department of City Planning
  checks:
    non_nullable: true
  example: None
  values:
  - value: '1'
    description: Office use
  - value: '2'
    description: Educational use
  - value: '3'
    description: Cultural & recreational use
  - value: '4'
    description: Public safety & criminal justice use
  - value: '5'
    description: Health & social service use
  - value: '6'
    description: Leased out to a private tenant
  - value: '7'
    description: Maintenance
    custom:
      other_details: '[''storage & infrastructure'']'
  - value: '8'
    description: Property with no use
  - value: '9'
    description: Property with a residential used
- id: excatdesc
  display_name: Expanded category description
  data_type: text
  description: Descriptions for the expanded category values. See EXPANDCAT for the
    domain values.
  data_source: Department of City Planning
  example: None
- id: leased
  display_name: Leased
  data_type: text
  description: "A value of \u201CL\u201D indicates that the agency\u2019s use of the\
    \ property is authorized through a lease. For questions about the lease or ownership\
    \ status of specific lots, please contact DCAS at (212) 386-0622 or RESPlanning311@dcas.nyc.gov."
  example: None
  values:
  - value: L
    description: Leased
- id: finalcom
  display_name: Final commitment
  data_type: text
  description: "A value of \u201CD\u201D indicates potential disposition by the City."
  example: None
  values:
  - value: D
    description: Potential Disposition
- id: agreement
  display_name: Lease agreement
  data_type: text
  description: For City-owned properties that are leased to another entity, this field
    indicates whether the agreement is short-term, long-term, or there are both short-
    and long-term agreements present.
  example: None
  values:
  - value: S
    description: Short-term
  - value: L
    description: Long-term
  - value: M
    description: Mixed (there are both short- and long-term agreements on the property)
- id: xcoord
  display_name: X coordinate
  data_type: integer
  description: X coordinate based on the Geosupport label point for the billing BBL.
    Coordinate system is NAD 1983 State Plane New York Long Island FIPS 3104 Feet.
  data_source: Department of City Planning
  example: '999900'
- id: ycoord
  display_name: Y coordinate
  data_type: integer
  description: Y coordinate based on the Geosupport label point for the billing BBL.
    Coordinate system is NAD 1983 State Plane New York Long Island FIPS 3104 Feet.
  data_source: Department of City Planning
  example: '228619'
- id: latitude
  display_name: Latitude
  data_type: decimal
  description: Latitude based on the Geosupport label point for the billing BBL. Coordinate
    system is NAD_1983.
  data_source: Department of City Planning
  example: '40.794169'
- id: longitude
  display_name: Longitude
  data_type: decimal
  description: Longitude based on the Geosupport label point for the billing BBL.
    Coordinate system is NAD_1983.
  data_source: Department of City Planning
  example: '-73.943479'
- id: dcpedited
  display_name: DCP Edited
  data_type: text
  description: City Planning modifies some records to correct street names or normalize
    parcel names when programmatic cleaning is insufficient. If a field has been manually
    modified, the original value can be found on GitHub in the modifications_applied.csv
    available in Outputs file series.
  data_source: Department of City Planning
  example: None
  values:
  - value: Y
    description: 'True'
- id: geom
  display_name: Geometry
  data_type: geometry
  description: Point geometry type
  example: None
  custom:
    readme_data_type: geometry
