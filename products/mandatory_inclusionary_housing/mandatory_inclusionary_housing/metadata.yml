id: mandatory_inclusionary_housing

attributes:
  description: 'The Mandatory Inclusionary Housing program was adopted in 2016 to
    encourage the creation of housing for families at a range of incomes in areas
    planned for housing growth. When actions of the Commission significantly increase
    residential density, the City Planning Commission and the City Council will apply
    one or more options to require affordable housing as part of new residential construction.


    All previously released versions of this data are available at <a href="https://www.nyc.gov/site/planning/data-maps/open-data/bytes-archive.page?sorts%5Byear%5D=0">BYTES
    of the BIG APPLE- Archive</a>

    '
  display_name: Mandatory Inclusionary Housing
  each_row_is_a: A Mandatorily Included House
  tags:
  - housing
  - house
  - building
  - development

assembly: []

destinations:
- id: socrata
  type: socrata
  files:
  - id: nycmih_metadata.pdf
    custom:
      destination_use: attachment
  - id: primary_shapefile
    custom:
      destination_use: dataset_file
  custom:
    four_four: bw8v-wzdr
- id: socrata_test
  type: socrata
  files:
  - id: nycmih_metadata.pdf
    custom:
      destination_use: attachment
  - id: primary_shapefile
    custom:
      destination_use: dataset_file
  custom:
    four_four: p6cc-cxkc

files:
- id: primary_shapefile
  filename: nycmih.zip
  type: shapefile
  overrides:
    overridden_columns:
    - id: zr_ulurpno
      custom:
        name: ZR_ULURPno
    - id: project_id
      custom:
        name: Project_ID
    - id: boro
      custom:
        name: Boro
    - id: mih_option
      custom:
        name: MIH_Option
    - id: zr_map
      custom:
        name: ZR_Map
    - id: cd
      custom:
        name: CD
    - id: projectnam
      custom:
        name: ProjectNam
    - id: dateadopte
      custom:
        name: DateAdopte
    - id: shape_leng
      custom:
        name: Shape_Leng
    - id: status
      custom:
        name: Status
    - id: shape_area
      custom:
        name: Shape_Area
    - id: the_geom
      data_type: geometry
      custom:
        name: geometry
    - id: zoning_map
      custom:
        name: Zoning_Map
- id: nycmih_metadata.pdf
  filename: nycmih_metadata.pdf

columns:
- id: the_geom
  display_name: the_geom
  data_type: geometry
  description: Geometry type, changed
  example: None
  custom:
    readme_data_type: geometry
- id: boro
  display_name: Boro
  data_type: text
  description: The NYC Borough where the Mandatory Inclusionary Housing (MIH) area
    is mapped. The boro code is a single digit identifier, indicating a particular
    borough (1 = Manhattan, 2 = Bronx, 3 = Brooklyn, 4 = Queens, 5 = Staten Island).
  example: '1'
  values:
  - value: '1'
    description: Manhattan
  - value: '2'
    description: Bronx
  - value: '3'
    description: Brooklyn
  - value: '4'
    description: Queens
  - value: '5'
    description: Staten Island
- id: status
  display_name: Status
  data_type: text
  description: Status of the ULURP text amendment application (Adopted = final approval,
    Pipeline = awaiting approval)
  example: Adopted
  values:
  - value: Adopted
- id: projectnam
  display_name: Project Name
  data_type: text
  description: Project Name of the Mandatory Inclusionary Housing (MIH) area.
  example: Jerome Avenue Rezoning
- id: dateadopte
  display_name: Date Adopted
  data_type: datetime
  description: The date the ULURP text amendment application was adopted.
  example: '2021-11-23T00:00:00.000'
- id: zr_ulurpno
  display_name: ZR_ULURP Number
  data_type: text
  description: The ULURP number of the ULURP text amendment application.
  example: 190352ZRQ
- id: zr_map
  display_name: ZR_Map
  data_type: text
  description: The map number referenced in Appendix F of the Zoning Resolution for
    the mapped Mandatory Inclusionary Housing (MIH) area.
  example: CD11-Map 1 (Area 1)
- id: cd
  display_name: CD
  data_type: text
  description: Community District where the Mandatory Inclusionary Housing (MIH) area
    is mapped.
  example: '1'
- id: mih_option
  display_name: MIH_Option
  data_type: text
  description: Level of affordability and options applied to the mapped Mandatory
    Inclusionary Housing (MIH) area.
  example: Option 1
- id: zoning_map
  display_name: Zoning_Map
  data_type: text
  description: Zoning Map index number where the Mandatory Inclusionary Housing (MIH)
    area is mapped.
  example: 16c
- id: project_id
  display_name: Project_ID
  data_type: text
  description: Zoning Application Portal (ZAP) project id. ZAP is a DCP project tracking
    database.
  example: P2013X0135
- id: shape_leng
  display_name: Shape_Length
  data_type: decimal
  description: Length of feature in feet.
  example: '837.017259715'
- id: shape_area
  display_name: Shape_Area
  data_type: decimal
  description: Area of feature in internal squared feet.
  example: '700002.648777'
