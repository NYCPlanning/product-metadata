id: privately_owned_public_spaces_pops

attributes:
  description: 'Privately owned public spaces, also known by the acronym POPS, are
    outdoor  and indoor spaces provided for public enjoyment by private owners in
    exchange  for bonus floor area or waivers, an incentive first introduced into
    New York City''s  zoning regulations in 1961. To find out more about POPS, visit
    the Department  of City Planning''s website at http://nyc.gov/pops. This database
    contains detailed  information about each privately owned public space in New
    York City.

    Data Source: Privately Owned Public Space Database (2018), owned and maintained  by
    the New York City Department of City Planning and created in collaboration  with
    Jerold S. Kayden and The Municipal Art Society of New York.

    All previously released versions of this data are available at  <a href=\"https://www.nyc.gov/site/planning/data-maps/open-data/bytes-archive.page?sorts%5Byear%5D=0">BYTES
    of the BIG APPLE- Archive</a>"

    '
  display_name: Privately Owned Public Spaces (POPS)
  each_row_is_a: Privately Owned Public Space
  tags:
  - dcp
  - privately owned public space database
  - pops

assembly: []

destinations:
- id: socrata
  type: socrata
  files:
  - id: pops_datadictionary.xlsx
    custom:
      destination_use: attachment
  - id: primary_csv
    overrides:
      overridden_columns:
      - id: popsnumber
        custom:
          api_name: pops_number
      - id: borough_code
        custom:
          api_name: borocode
      - id: building_address_with_zip_code
        custom:
          api_name: building_address_with_zip
      - id: community_board
        custom:
          api_name: community_district
      - id: principal_public_space_designer
        custom:
          api_name: principal_public_space
      - id: physically_disabled_access
        custom:
          api_name: physically_disabled
    custom:
      destination_use: dataset_file
  custom:
    four_four: rvih-nhyn

files:
- id: primary_shapefile
  filename: dcp_pops.shp.zip
  type: shapefile
  overrides:
    omitted_columns:
    - geocoded_column
    overridden_columns:
    - id: pops_number
      custom:
        name: popsnumber
    - id: borough_name
      custom:
        name: boro_name
    - id: borocode
      custom:
        name: boro_code
    - id: address_number
      custom:
        name: add_number
    - id: street_name
      custom:
        name: streetname
    - id: building_address_with_zip
      custom:
        name: addzipcode
    - id: community_district
      custom:
        name: cd
    - id: council_district
      custom:
        name: cc_dist
    - id: census_tract
      custom:
        name: cen_tract
    - id: building_name
      custom:
        name: bldg_name
    - id: building_location
      custom:
        name: bldg_loc
    - id: year_completed
      custom:
        name: year_comp
    - id: building_constructed
      custom:
        name: constructd
    - id: public_space_type
      custom:
        name: ps_type
    - id: building_architect
      custom:
        name: architect
    - id: principal_public_space
      custom:
        name: designer
    - id: size_required
      custom:
        name: size_reqd
    - id: hour_of_access_required
      custom:
        name: houraccess
    - id: amenities_required
      custom:
        name: amen_reqd
    - id: permitted_amenities
      custom:
        name: perm_amen
    - id: other_required
      custom:
        name: other_reqd
    - id: physically_disabled
      custom:
        name: phys_dis
- id: primary_csv
  filename: pops.csv
  type: csv
  overrides:
    overridden_columns:
    - id: pops_number
      custom:
        name: popsnumber
    - id: borocode
      custom:
        name: borough_code
    - id: building_address_with_zip
      custom:
        name: building_address_with_zip_code
    - id: community_district
      custom:
        name: community_board
    - id: principal_public_space
      custom:
        name: principal_public_space_designer
    - id: physically_disabled
      custom:
        name: physically_disabled_access
- id: pops_datadictionary.xlsx
  filename: pops_datadictionary.xlsx

columns:
- id: WKT
  display_name: WKT
  data_type: text
  example: POINT (-73.948665 40.70116)
- id: pops_number
  display_name: POPS_Number
  data_type: text
  description: 'POPS Number is the record number the Department of City Planning uses
    to identify a building address within the POPS Database.

    '
  example: K010001
- id: borough_name
  display_name: Borough
  data_type: text
  description: 'The Borough in which the public space is located. The City has 5 geographically  defined
    boroughs.

    '
  checks:
    non_nullable: true
  example: None
  values:
  - value: Manhattan
  - value: Brooklyn
  - value: Queens
  - value: Bronx
  - value: Staten Island
- id: borocode
  display_name: Borocode
  data_type: integer
  description: 'Borough Code is a single digit that represents the borough in which
    the public  space is located. The City has 5 geographically defined boroughs.

    '
  checks:
    non_nullable: true
  example: None
  values:
  - value: '1'
    description: Manhattan
  - value: '2'
    description: Bronx
  - value: '3'
    description: Brooklyn
  - value: '4'
    description: Queens
  - value: '5'
    description: Staten Island
- id: community_district
  display_name: Community Board
  data_type: integer
  description: "The community district in which the public space is located. The City\
    \ has  59 geographically defined community districts overseen by community boards.\
    \  The community boards play a role in the City\u2019s Uniform Land Use Review\
    \  Procedure (ULURP), as well as in the review of other City Planning Commission\
    \  and Board of Standards and Appeals actions.\n"
  example: '5'
- id: address_number
  display_name: Number
  data_type: text
  description: "The address number as displayed on the building\u2019s exterior or\
    \ as recorded in  Department of Finance records.\n"
  example: '200'
- id: street_name
  display_name: Street
  data_type: text
  description: "The street name as displayed on the building\u2019s exterior or as\
    \ recorded in  Department of Finance records.\n"
  example: BROADWAY
- id: zip_code
  display_name: Postcode
  data_type: integer
  description: 'The zip code in which the public space is located.

    '
  example: '10022'
- id: building_address_with_zip
  display_name: Building_Address_With_Zip_Code
  data_type: text
  description: "Building Address with Zip Code is the street address as displayed\
    \ on  the building\u2019s exterior or as recorded in Department of Finance records.\n"
  example: 1000 TENTH AVENUE, New York, NY 10019
- id: tax_block
  display_name: Tax_Block
  data_type: integer
  description: "Tax Block is the block number for the development\u2019s relevant\
    \ zoning lots.  The block refers to a city block, within which are a number of\
    \ lots. The source for  this information is the Department of Finance records\
    \ and published information  such as the Sanborn Manhattan Land Book.\n"
  example: '1292'
- id: tax_lot
  display_name: Tax_Lot
  data_type: integer
  description: "Tax Lot is the lot number(s) for the development\u2019s relevant zoning\
    \ lots. The block refers  to a city block, within which are a number of lots.\
    \ With condominium buildings, each  condominium unity has its own lot number.\
    \ The source for this information is the Department  of Finance records and published\
    \ information such as the Sanborn Manhattan Land Book.\n"
  example: '7501'
- id: building_name
  display_name: Building_Name
  data_type: text
  description: "The name of the building as displayed on the building\u2019s exterior\
    \ or as generally presented  to the public. If there is no building name, the\
    \ field is left blank.\n"
  example: Normandie Court
- id: building_location
  display_name: Building_Location
  data_type: text
  description: 'The location of the main entrance or entrances to the building, and
    describes the building  rather than the public space, location.

    '
  example: South side of West 57th Street between Sixth and Seventh Avenues
- id: year_completed
  display_name: Year_Completed
  data_type: text
  description: 'Year Completed is the year the building was completed, according to
    published information  and discussions with the owner.

    '
  example: '1974'
- id: building_constructed
  display_name: Building_Constructed
  data_type: text
  description: 'Building Construction is the construction status of the building,
    according to  published information and discussions with the owner.

    '
  example: None
  values:
  - value: Completed
  - value: Under Construction
- id: public_space_type
  display_name: Public_Space_Type
  data_type: text
  description: 'Public Space Type is the type of spaces required to be provided at
    the development.

    '
  example: Plaza
- id: developer
  display_name: Developer
  data_type: text
  description: "Developer is the name of the legal entity or a person or persons participating\
    \ in  the legal entity that has developed the building and its public space(s).\
    \ \nThe sources for this field are varied, including legal records, published\
    \ information,  and discussions with the current owner.\n"
  example: Fisher Brothers
- id: building_architect
  display_name: Building_Architect
  data_type: text
  description: "Building Architect is the architect of the building. \nThe sources\
    \ for this field are varied, including legal records, published information, \
    \ and discussions with the current owner.\n"
  example: Emery Roth & Sons
- id: principal_public_space
  display_name: Principal_Public_Space_Designer
  data_type: text
  description: "Principal Public Space Designer is the designer who designed or redesigned\
    \ the public space,  and frequently is the building architect. \nThe sources for\
    \ this field are varied, including legal records, published information,  and\
    \ discussions with the current owner.\n"
  example: Emery Roth & Sons
- id: size_required
  display_name: Size_Required
  data_type: text
  description: 'Size Required is the legally required size of the public space(s)
    at the development.

    '
  example: Through Block Connection 3012.00 sf
- id: hour_of_access_required
  display_name: Hour_Of_Access_Required
  data_type: text
  description: 'Hours of Access Required is the legally required hours that the public
    space(s)  at the development must be open to the public.

    '
  example: 24 Hours
- id: amenities_required
  display_name: Amenities_Required
  data_type: text
  description: 'Amenities Required is the legally required amenities at the public
    space(s)  at the development.

    '
  example: Plaque/Sign; Subway; Trees on Street
- id: other_required
  display_name: Other_Required
  data_type: text
  description: 'Other Required is the other legally required amenities at the public
    space(s)  at the development.

    '
  example: skylight
- id: permitted_amenities
  display_name: Permitted_Amenities
  data_type: text
  description: 'Permitted Required is the permitted amenities at the public space(s)
    at the development.

    '
  example: Open Air Cafe
- id: physically_disabled
  display_name: Physically_Disabled
  data_type: text
  description: "Physically Disabled is a description of whether or not the public\
    \ spaces, taken as  a whole, are wheelchair accessible to some degree to the physically\
    \ disabled. \nFull/Partial means that the spaces are fully or partially accessible.\n"
  example: None
  values:
  - value: Full/Partial
  - value: Unknown
- id: latitude
  display_name: Latitude
  data_type: decimal
  description: 'The latitude of the development.

    '
  example: '40.70741'
- id: longitude
  display_name: Longitude
  data_type: decimal
  description: 'The longitude of the development.

    '
  example: '-74.13974'
- id: xcoordinate
  display_name: XCoordinate
  data_type: integer
  description: 'X coordinate in NAD 1983 State Plane New York Long Island FIPS 3104
    (US Feet)

    '
  example: '990213'
- id: ycoordinate
  display_name: YCoordinate
  data_type: integer
  description: 'Y coordinate in NAD 1983 State Plane New York Long Island FIPS 3104
    (US Feet)

    '
  example: '197005'
- id: council_district
  display_name: Council District
  data_type: integer
  description: 'The City Council district in which the public space is located.

    '
  example: '4'
- id: census_tract
  display_name: Census Tract
  data_type: decimal
  description: 'The census tract in which the public space is located.

    '
  example: '7'
- id: bin
  display_name: BIN
  data_type: integer
  description: "The Building Identification Number (BIN) is a unique number assigned\
    \ by the  Department of City Planning (DCP) and used by the Department of Buildings\
    \ (DOB)  for each building in NYC. \nThis field consists of the borough code followed\
    \ by six digits unique for buildings  within that borough.\n"
  example: '1000000'
- id: bbl
  display_name: BBL
  data_type: bbl
  description: 'A concatenation of the borough code, tax block and tax lot. This field
    consists of  the borough code followed by the tax block followed by the tax lot.
    The borough  code is one numeric digit. The tax block is one to five numeric digits,
    preceded  with leading zeros when the block is less than five digits. The tax
    lot is one to  four digits and is preceded with leading zeros when the lot is
    less than four digits.

    '
  example: '1000047501'
- id: nta
  display_name: NTA
  data_type: text
  description: 'The Neighborhood Tabulaton Area (NTA) in which the public space is
    located. NTAs were  created by aggregating census tracts. NTAs were delineated
    with the need for both geographic  specificity and statistical reliability in
    mind.  Though NTA boundaries and their associated  names roughly correspond with
    many neighborhoods commonly recognized by New Yorkers, NTAs  are not intended
    to definitively represent neighborhoods, nor are they intended to be exhaustive  of
    all possible names and understandings of neighborhoods throughout New York City.

    '
  example: None
- id: geocoded_column
  display_name: Location
  data_type: text
  example: POINT(-73.948665 40.70116)
